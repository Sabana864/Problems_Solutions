<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration Form</title>
  <style>
    body{
      margin: 0;
      padding: 0;
      font-family: Arial,sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right,#0072ff,#00d4aa);
    }
    .form-box
    {
      width: 350px;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
    }
    h2
    {
      text-align: center;
      color: #00bfa0;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    .but{
      text-align: center;
      margin-left: 130px;
      padding: 15px;
      padding-left: 25px;
      padding-right: 25px;
      background:linear-gradient(to right,#0072ff,#00d4aa);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }
    .edit
    {
      color: #136857;
      font-weight: bold;
    }
    .inp
    {
      margin-top: 9px;
      padding: 10px;
      padding-right: 175px;
      border-color: #0072ff;
      border-radius: 10px;
    }
    .inp2
    {
      margin-top: 9px;
      padding: 10px;
      padding-right: 225px;
      border-color: #0072ff;
      border-radius: 10px;
    }
    .inp3
    {
      margin-top: 9px;
      padding: 10px;
      padding-right: 255px;
      border-color: #0072ff;
      border-radius: 10px;
      border-width: 2px;
    }
    .inp4
    {
      padding: 0px;
      border-color: #0072ff;
      border-radius: 8px;
      border-width: 2px;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Event Registration</h2>
    <form onsubmit="showMessage();return false;">
      <label class="edit">Name:</label>
      <br>
      <input class="inp" type="text" placeholder="Enter your name" required autofocus>
      <br>
      <br>
      <label class="edit">Email:</label>
      <br>
      <input class="inp" type="email" placeholder="Enter your email" required>
      <br>
      <br>
      <label class="edit" for="da">Enter Date:</label>
      <br>
      <input class="inp2" id="da" type="date" required>
      <br>
      <br>
      <label class="edit" for="ev">Event Type:</label>
      <br>
      <select class="inp3" id="ev" required>
          <option>Music</option>
          <option>Sports</option>
          <option>Workshop</option>
      </select>
      <br>
      <br>
      <label class="edit">Message:</label>
      <br>
      <br>
      <textarea class="inp4" rows="5" cols="45" placeholder="Enter your message/suggestions"></textarea>

      <br>
      <br>
      <button class="but" type="submit">Register</button>

      <br>
      <br>
      <output id="result"></output>
    </form>
  </div>
  
  <script>
    function showMessage()
    {
      document.getElementById("result").innerHTML="Registration Successful!";
    }
  </script>
</body>
</html>
