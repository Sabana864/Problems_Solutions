<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Events Gallery</title>
  <style>
    body{
      background-color: rgb(238, 163, 174);
    }
    table{
      margin: auto;
    }
    .gallery
    {
      width: 250px;
      height: 150px;
      border: 2px solid rgb(81, 74, 74);
      border-radius: 15px;
    }
    td{
      padding: 50px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1 align="center">Community Events Gallery</h1>
  <table>
    <tr>
      <td>
        <img src="images/event1.jpg" alt="Music Event" title="Music Event" class="gallery">
        <p>Music Event</p>
      </td>
      <td>
        <img src="images/event2.jpg" alt="Food Festival" title="Food Festival" class="gallery">
        <p>Food Festival</p>
      </td>
      <td>
        <img src="images/event3.jpg" alt="Sports Day" title="Sports Day" class="gallery">
        <p>Sports Day</p>
      </td>
    </tr>
    <tr>
      <td>
        <img src="images/event4.jpg" alt="Dance Show" title="Dance Show" class="gallery">
        <p>Dance Show</p>
      </td>
      <td>
        <img src="images/event5.jpg" alt="Art Exhibition" title="Art Exhibition" class="gallery">
        <p>Art Exhibition</p>
      </td>
      <td>
        <img src="images/event6.jpg" alt="Book Fair" title="Book Fair" class="gallery">
        <p>Book Fair</p>
      </td>
    </tr>
  </table>
</body>
</html>
