<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Example</title>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Internal CSS -->
  <style>
    p
    {
      color: rgb(23, 197, 124);
      font-weight: bold;
      font-size: 25px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      font-style: oblique;
    }
  </style>
</head>
<body>
  <!-- Inline CSS -->
  <h1 style="color: red; font-style:italic;">Inline CSS EXAMPLE</h1>
  <h2>This is for external css</h2>
  <p>This is for internal css</p>
</body>
</html>
