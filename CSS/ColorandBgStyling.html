<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color and Background styling</title>
  <style>
      body{
        background-color: lightblue;
        background-image: url(../HTML5/images/bg.jpg);
        background-size: cover;
      }
      h1{
        background: linear-gradient(to right,purple,pink);
        color:white;
        padding: 10px;

      }
  </style>
</head>
<body>
  <h1>City Portal</h1>
  <h2>Welcome Station</h2>
  <p>This is a simple paragraph</p>
</body>
</html>
